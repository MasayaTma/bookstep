<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>書籍一覧 | BookStep</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container page-shell">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="page-heading">
        <div>
            <p class="eyebrow">MY BOOKSHELF</p>
            <h1>書籍一覧</h1>
            <p>登録した本を一覧で確認できます。</p>
        </div>
        <a class="button button-primary" th:href="@{/books/new}">書籍を登録</a>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(books)}">
        <div class="empty-icon" aria-hidden="true">＋</div>
        <h2>最初の一冊を登録しましょう</h2>
        <p>タイトルだけでも登録できます。気になる本から始めてみてください。</p>
        <a class="button button-primary" th:href="@{/books/new}">書籍を登録</a>
    </div>

    <div class="book-grid book-grid-large" th:unless="${#lists.isEmpty(books)}">
        <article class="book-card" th:each="book : ${books}">
            <div class="book-spine" aria-hidden="true"></div>
            <div class="book-card-body">
                <div class="book-card-topline">
                    <span class="status-badge" th:classappend="|status-${#strings.toLowerCase(book.status.name())}|"
                          th:text="${book.status.displayName}">未読</span>
                    <span class="book-date" th:text="${#temporals.format(book.createdAt, 'yyyy.MM.dd')}">2026.07.15</span>
                </div>
                <h2 th:text="${book.title}">書籍タイトル</h2>
                <p class="book-author" th:text="${book.author ?: '著者未設定'}">著者名</p>
                <p class="book-meta">
                    <span th:text="${book.category ?: 'カテゴリ未設定'}">カテゴリ</span>
                    <span th:if="${book.totalPages != null}" th:text="|${book.totalPages}ページ|">300ページ</span>
                </p>
                <div class="card-actions">
                    <a class="button button-secondary button-small" th:href="@{/books/{id}(id=${book.id})}">詳細</a>
                    <a class="text-link" th:href="@{/books/{id}/edit(id=${book.id})}">編集</a>
                </div>
            </div>
        </article>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
